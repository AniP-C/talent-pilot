<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { 
            width: 320px; 
            font-family: Arial, sans-serif; 
            padding: 15px; 
            margin: 0;
            background-color: #f9f9f9;
        }
        .header {
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 2px solid #0073b1; 
            padding-bottom: 5px; 
            margin-bottom: 15px;
        }
        h3 { margin: 0; color: #333; }
        #open-dashboard { 
            color: #0073b1; font-size: 12px; cursor: pointer; text-decoration: underline; font-weight: bold; 
        }
        #job-info {
            background: white; padding: 10px; border-radius: 6px; border: 1px solid #ddd; margin-bottom: 10px; font-size: 14px;
        }
        /* NEW: Dropdown Styling */
        .profile-select {
            width: 100%; padding: 8px; margin-bottom: 10px; border-radius: 5px; border: 1px solid #ccc; font-size: 13px; background-color: white; font-weight: bold; color: #333; cursor: pointer;
        }
        .btn { 
            width: 100%; padding: 10px; margin-top: 5px; cursor: pointer; border: none; border-radius: 5px; font-weight: bold; transition: 0.2s;
        }
        .btn-primary { background: #0073b1; color: white; }
        .btn-primary:hover { background: #005682; }
        .btn-success { background: #28a745; color: white; }
        .btn-success:hover { background: #1e7e34; }
        #status-area { margin-top: 15px; font-size: 13px; color: #333; line-height: 1.4; }
        .warning { color: #d9534f; font-weight: bold; }
        .success-text { color: #28a745; font-weight: bold; }
    </style>
</head>
<body>
    <div class="header">
        <h3>🤖 Job Copilot</h3>
        <span id="open-dashboard">Dashboard ↗</span>
    </div>
    
    <div id="job-info">Scanning page...</div>
    
    <select id="profile-dropdown" class="profile-select" style="display:none;"></select>
    
    <button id="btn-analyze" class="btn btn-primary" style="display:none;">🧠 Analyze Match</button>
    <button id="btn-save" class="btn btn-success" style="display:none;">💾 Save Job to DB</button>
    
    <div id="status-area"></div>

    <script src="popup.js"></script>
</body>
</html>
